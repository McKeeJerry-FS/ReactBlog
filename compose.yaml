services:
  blog-database:
    image: mongo
    ports:
      - "27017:27017"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'mongosh --quiet --eval "db.adminCommand(''ping'').ok" || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
  blog-backend:
    build: ./backend/vite-project
    environment:
      - PORT=3000
      - MONGO_URI=mongodb://blog-database:27017/blog
    ports:
      - "3000:3000"
    depends_on:
      blog-database:
        condition: service_healthy
  blog-frontend:
    build:
      context: ./vite-project
      args:
        - VITE_BACKEND_URL=http://localhost:3000/api/v1
    ports:
      - "3001:80"
    depends_on:
      - blog-backend
