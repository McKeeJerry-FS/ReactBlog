services:
  blog-database:
    image: mongo
    ports:
      - '27017:27017'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'mongosh --quiet --eval "db.adminCommand(''ping'').ok" || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
  blog-backend:
    build: ./backend
    environment:
      - PORT=3000
      - MONGO_URI=mongodb://blog-database:27017/blog
      - JWT_SECRET=dev_jwt_secret_change_me
    ports:
      - '3000:3000'
    depends_on:
      blog-database:
        condition: service_healthy
  blog-frontend:
    build:
      context: .
      args:
        - VITE_BACKEND_URL=http://localhost:3000/api/v1
    ports:
      - '3001:8080'
    depends_on:
      - blog-backend
