name: Deploy Blog Application
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      IMAGE_TAG: ${{ github.sha }}
    environment:
      name: production
      url: ${{ steps.deploy-frontend.outputs.url }}
    steps:
      - uses: actions/checkout@v4
      - name: Validate deployment secrets
        run: |
          test -n "${{ secrets.DOCKERHUB_USERNAME }}" || { echo "Missing DOCKERHUB_USERNAME secret"; exit 1; }
          test -n "${{ secrets.DOCKERHUB_TOKEN }}" || { echo "Missing DOCKERHUB_TOKEN secret"; exit 1; }
          test -n "${{ secrets.MONGO_URI }}" || { echo "Missing MONGO_URI secret"; exit 1; }
          test -n "${{ secrets.JWT_SECRET }}" || { echo "Missing JWT_SECRET secret"; exit 1; }
          test -n "${{ secrets.GOOGLECLOUD_REGION }}" || { echo "Missing GOOGLECLOUD_REGION secret"; exit 1; }
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: google-github-actions/auth@v1
        with:
          service_account: ${{ secrets.GOOGLECLOUD_SERVICE_ACCOUNT }}
          credentials_json: ${{ secrets.GOOGLECLOUD_CREDENTIALS }}
      - name: Build and Push backend image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_USERNAME }}/blogv2-backend:latest
            ${{ env.DOCKER_USERNAME }}/blogv2-backend:${{ env.IMAGE_TAG }}
      - id: deploy-backend
        name: Deploy backend
        uses: google-github-actions/deploy-cloudrun@v1
        with:
          service: blogv2-backend
          image: ${{ env.DOCKER_USERNAME }}/blogv2-backend:${{ env.IMAGE_TAG }}
          region: ${{ secrets.GOOGLECLOUD_REGION }}
          env_vars: |
            MONGO_URI=${{ secrets.MONGO_URI }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            NODE_ENV=production
      - name: Build and Push frontend image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_USERNAME }}/blogv2-frontend:latest
            ${{ env.DOCKER_USERNAME }}/blogv2-frontend:${{ env.IMAGE_TAG }}
          build-args: |
            VITE_BACKEND_URL=${{ steps.deploy-backend.outputs.url }}/api/v1
      - id: deploy-frontend
        name: Deploy frontend
        uses: google-github-actions/deploy-cloudrun@v1
        with:
          service: blogv2-frontend
          image: ${{ env.DOCKER_USERNAME }}/blogv2-frontend:${{ env.IMAGE_TAG }}
          region: ${{ secrets.GOOGLECLOUD_REGION }}
