name: Deploy Blog Application
on: 
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKERHUB_USERNAME || vars.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKERHUB_TOKEN || vars.DOCKER_PASSWORD }}
      GOOGLECLOUD_REGION: ${{ secrets.GOOGLECLOUD_REGION || vars.GOOGLECLOUD_REGION }}
    environment:
      name: production
      url: ${{ steps.deploy-frontend.outputs.url }}
    steps:
      - uses: actions/checkout@v4
      - name: Validate deployment configuration
        run: |
          test -n "$DOCKER_USERNAME" || { echo "Missing DOCKERHUB_USERNAME secret or variable"; exit 1; }
          test -n "$DOCKER_PASSWORD" || { echo "Missing DOCKERHUB_TOKEN secret or variable"; exit 1; }
          test -n "${{ secrets.GOOGLECLOUD_CREDENTIALS }}" || { echo "Missing GOOGLECLOUD_CREDENTIALS secret"; exit 1; }
          test -n "$GOOGLECLOUD_REGION" || { echo "Missing GOOGLECLOUD_REGION secret or variable"; exit 1; }
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}
      - uses: google-github-actions/auth@v1
        with:
          service_account: ${{ secrets.GOOGLECLOUD_SERVICE_ACCOUNT }}
          credentials_json: ${{ secrets.GOOGLECLOUD_CREDENTIALS }}
      - name: Build and Push backend image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.DOCKERHUB_USERNAME }}/blogv2-backend:latest
      - id: deploy-backend
        name: Deploy backend
        uses: google-github-actions/deploy-cloudrun@v1
        with:
          service: blogv2-backend
          image: ${{ env.DOCKERHUB_USERNAME }}/blogv2-backend:latest
          region: ${{ env.GOOGLECLOUD_REGION }}
      - name: Build and Push frontend image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.DOCKERHUB_USERNAME }}/blogv2-frontend:latest
          build-args: |
            VITE_BACKEND_URL=${{ steps.deploy-backend.outputs.url }}/api/v1
      - id: deploy-frontend
        name: Deploy frontend
        uses: google-github-actions/deploy-cloudrun@v1
        with:
          service: blogv2-frontend
          image: ${{ env.DOCKERHUB_USERNAME }}/blogv2-frontend:latest
          region: ${{ env.GOOGLECLOUD_REGION }}
                